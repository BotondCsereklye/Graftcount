name: graft_tracker_app
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Lokale Zwischenspeicherung
  shared_preferences: ^2.2.2

  # Für Datei-Zugriff (CSV Export)
  path_provider: ^2.1.2

  # Für PDF Export
  pdf: ^3.11.1

  # Für Drucken
  printing: ^5.13.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/logo.jpeg"
  adaptive_icon_background: "#0B1C36"
  adaptive_icon_foreground: "assets/logo.jpeg"

flutter:
  uses-material-design: true
  
  assets:
    - assets/logo.jpeg
